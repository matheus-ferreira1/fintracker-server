services:
  postgres:
    image: postgres:16-alpine
    container_name: fintracker-node-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: fintracker-node-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/fintracker?schema=public"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fintracker
      DB_USER: postgres
      DB_PASSWORD: postgres
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  node_modules:
